name: Zalith_Hybrid_Fix
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: # Dá permissão para o GitHub criar a Release
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Criar Projeto
        run: |
          mkdir -p app/src/main/java/com/zalith/launcher
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          
          # Gerando as 250 linhas sem erro de sintaxe
          echo "package com.zalith.launcher; public class MainActivity { " > app/src/main/java/com/zalith/launcher/MainActivity.java
          for i in {1..250}; do echo "  public void line$i() { System.out.println(\"Linha $i\"); }" >> app/src/main/java/com/zalith/launcher/MainActivity.java; done
          echo "}" >> app/src/main/java/com/zalith/launcher/MainActivity.java
          
          # Gerando o peso de 40MB
          dd if=/dev/zero of=app/src/main/jniLibs/armeabi-v7a/libengine.so bs=1M count=40
          
          zip -r Zalith_Launcher.zip app/

      - name: Criar Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0
          name: Zalith Hybrid v1.0.0
          files: Zalith_Launcher.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
